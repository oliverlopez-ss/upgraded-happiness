<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial War Room – Structsales AB</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
      background: #0D1F2D;
      color: #fff;
      min-height: 100vh;
    }
    .header {
      background: #1C3F5E;
      border-bottom: 3px solid #2A9D8F;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-brand { font-size: 11px; color: #2A9D8F; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
    .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-time { font-size: 11px; color: rgba(255,255,255,0.4); }
    .data-source-badge {
      font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .data-source-badge.live { background: rgba(42,157,143,0.2); color: #2A9D8F; border: 1px solid rgba(42,157,143,0.4); }
    .data-source-badge.fallback { background: rgba(233,196,106,0.2); color: #E9C46A; border: 1px solid rgba(233,196,106,0.4); }
    .btn-refresh {
      background: #2A9D8F; color: #fff; border: none; border-radius: 6px;
      padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    .btn-refresh:hover { background: #238b7f; }
    .btn-refresh:disabled { background: rgba(42,157,143,0.3); cursor: not-allowed; }
    .content { padding: 24px 32px; max-width: 1200px; }
    .section-label {
      font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase;
      letter-spacing: 2px; margin-bottom: 12px;
    }
    .stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: 16px 20px; flex: 1; min-width: 160px;
    }
    .stat-card .label {
      font-size: 11px; color: rgba(255,255,255,0.45); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 6px;
    }
    .stat-card .value {
      font-size: 22px; font-weight: 700; color: #fff;
      font-family: 'DM Mono', monospace; line-height: 1;
    }
    .stat-card .sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 4px; }
    .accent-top { border-top: 3px solid #2A9D8F; }
    .warn-top { border-top: 3px solid #E76F51; }
    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 24px 0; }
    .pipeline-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .pipeline-info { font-size: 13px; color: rgba(255,255,255,0.5); }
    .pipeline-info .hl { color: #2A9D8F; font-weight: 700; }
    .sort-buttons { display: flex; gap: 6px; }
    .sort-btn {
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5);
      border: none; border-radius: 4px; padding: 5px 12px; font-size: 11px;
      cursor: pointer; font-weight: 400;
    }
    .sort-btn.active { background: #2A9D8F; color: #fff; font-weight: 700; }
    .table-wrap {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; overflow: hidden;
    }
    .table-head {
      display: grid; grid-template-columns: 1fr 130px 80px 130px 90px;
      padding: 10px 20px; background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px;
    }
    .table-row {
      display: grid; grid-template-columns: 1fr 130px 80px 130px 90px;
      padding: 12px 20px; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .table-row:last-child { border-bottom: none; }
    .table-row:nth-child(odd) { background: rgba(255,255,255,0.015); }
    .table-row:hover { background: rgba(42,157,143,0.08); }
    .table-footer {
      display: grid; grid-template-columns: 1fr 130px 80px 130px 90px;
      padding: 12px 20px; background: rgba(42,157,143,0.1);
      border-top: 1px solid rgba(42,157,143,0.25);
      font-size: 13px; font-weight: 700;
    }
    .deal-name { font-size: 13px; color: rgba(255,255,255,0.85); font-weight: 500; }
    .deal-amount { text-align: right; font-size: 13px; color: rgba(255,255,255,0.6); font-family: 'DM Mono', monospace; }
    .deal-weighted { text-align: right; font-size: 13px; font-weight: 600; color: #2A9D8F; font-family: 'DM Mono', monospace; }
    .deal-date { text-align: right; font-size: 12px; color: rgba(255,255,255,0.4); }
    .prob-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
      font-weight: 700; min-width: 38px; text-align: center;
    }
    .prob-high { background: rgba(42,157,143,0.13); color: #2A9D8F; border: 1px solid rgba(42,157,143,0.33); }
    .prob-mid { background: rgba(233,196,106,0.13); color: #E9C46A; border: 1px solid rgba(233,196,106,0.33); }
    .prob-low { background: rgba(231,111,81,0.13); color: #E76F51; border: 1px solid rgba(231,111,81,0.33); }
    .error-box {
      background: rgba(231,111,81,0.15); border: 1px solid rgba(231,111,81,0.25);
      border-radius: 8px; padding: 12px 16px; color: #E76F51; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .back-link {
      color: rgba(255,255,255,0.4); text-decoration: none; font-size: 12px;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .back-link:hover { color: #2A9D8F; }
    @media (max-width: 768px) {
      .header { padding: 12px 16px; flex-direction: column; gap: 12px; }
      .content { padding: 16px; }
      .stats { flex-direction: column; }
      .stat-card { min-width: auto; }
      .table-head, .table-row, .table-footer { grid-template-columns: 1fr 100px 60px 100px; }
      .table-head span:last-child, .table-row span:last-child, .table-footer span:last-child { display: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <a href="../" class="back-link">&larr; Tillbaka</a>
      <div class="header-brand">Structsales AB</div>
      <div class="header-title">Financial War Room</div>
    </div>
    <div class="header-right">
      <span id="dataSourceBadge" class="data-source-badge fallback">Demo-data</span>
      <span class="header-time" id="lastUpdated"></span>
      <button class="btn-refresh" id="btnRefresh" onclick="refreshData()">&#10227; Uppdatera</button>
    </div>
  </div>


  <div class="content">
    <div class="section-label">Snapshot</div>
    <div class="stats" id="statsGrid"></div>

    <div class="divider"></div>

    <div class="pipeline-header">
      <div>
        <div class="section-label" style="margin-bottom:4px">Pipeline (HubSpot)</div>
        <div class="pipeline-info" id="pipelineSummary"></div>
      </div>
      <div class="sort-buttons">
        <button class="sort-btn active" data-sort="weighted" onclick="sortDeals('weighted',this)">Viktat</button>
        <button class="sort-btn" data-sort="amount" onclick="sortDeals('amount',this)">Värde</button>
        <button class="sort-btn" data-sort="prob" onclick="sortDeals('prob',this)">Sannolikhet</button>
      </div>
    </div>

    <div id="errorBox" class="error-box"></div>

    <div class="table-wrap">
      <div class="table-head">
        <span>Affär</span>
        <span style="text-align:right">Värde</span>
        <span style="text-align:center">Sannol.</span>
        <span style="text-align:right">Viktat värde</span>
        <span style="text-align:right">Close date</span>
      </div>
      <div id="dealsBody"></div>
      <div class="table-footer" id="dealsFooter"></div>
    </div>
  </div>

  <script>
    // ── Google Sheet config ──
    // CSV hämtas av GitHub Action (fetch-google-sheet.yml) → data/finanser.csv
    var SHEET_CSV_LOCAL = "data/finanser.csv";
    var SHEET_CSV_FALLBACK = "import-finanser.csv";

    // ── Financial data (fylls från Google Sheet) ──
    var cash = 0;
    var totalBurn = 0;
    var currentRevenue = 0;
    var runway = 0;
    var sheetMonth = "";
    var sheetDataLoaded = false;

    // ── CSV-parser ──
    function parseCSV(text) {
      var lines = text.trim().split("\n");
      return lines.map(function(line) {
        var cells = [];
        var current = "";
        var inQuotes = false;
        for (var i = 0; i < line.length; i++) {
          var ch = line[i];
          if (ch === '"') {
            inQuotes = !inQuotes;
          } else if (ch === ',' && !inQuotes) {
            cells.push(current.trim());
            current = "";
          } else {
            current += ch;
          }
        }
        cells.push(current.trim());
        return cells;
      });
    }

    // ── Hämta finansdata från lokal CSV (synkad av GitHub Action) ──
    async function fetchSheetData() {
      var text;
      try {
        var resp = await fetch(SHEET_CSV_LOCAL + "?" + Date.now());
        if (!resp.ok) throw new Error("data/finanser.csv saknas (HTTP " + resp.status + ")");
        text = await resp.text();
      } catch(e) {
        console.warn("Primär CSV misslyckades (" + e.message + "), försöker fallback...");
        var fallbackResp = await fetch(SHEET_CSV_FALLBACK + "?" + Date.now());
        if (!fallbackResp.ok) throw new Error("Ingen finansdata tillgänglig. Kör GitHub Action 'Fetch Google Sheet' först.");
        text = await fallbackResp.text();
      }
      var rows = parseCSV(text);

      // Rad 0 = headers: [Jan/label, Feb, Mar, Apr, Maj, Jun, ...]
      var headers = rows[0];

      // Hitta kolumn för aktuell månad
      var monthNames = ["Jan", "Feb", "Mar", "Apr", "Maj", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dec"];
      var now = new Date();
      var targetMonth = monthNames[now.getMonth()];

      var colIdx = -1;
      for (var i = 0; i < headers.length; i++) {
        if (headers[i].toLowerCase().indexOf(targetMonth.toLowerCase()) === 0) {
          colIdx = i;
          break;
        }
      }
      // Fallback: senaste kolumnen med data
      if (colIdx < 0) colIdx = headers.length - 1;

      sheetMonth = targetMonth;

      // Rad 1 = Startbalans (värdet finns i kolumn B = index 1)
      var startbalans = parseFloat((rows[1][1] || "").replace(/\s/g, "")) || 0;

      // Rad 2 = INTÄKTER
      // Rad 3 = UTGIFTER header (tom)
      // Rad 4+ = utgiftsposter

      // Beräkna kassa: startbalans + kumulativa (intäkter - utgifter) per månad
      // Kolumn A (index 0) är etiketter, data börjar vid index 1 (Feb)
      var dataStartCol = 1; // Feb
      var cashPosition = startbalans;

      for (var m = dataStartCol; m <= colIdx; m++) {
        var monthRevenue = parseFloat((rows[2][m] || "").replace(/\s/g, "")) || 0;
        var monthExpenses = 0;
        for (var r = 4; r < rows.length; r++) {
          monthExpenses += parseFloat((rows[r][m] || "").replace(/\s/g, "")) || 0;
        }
        cashPosition += monthRevenue - monthExpenses;
      }

      // Aktuell månads burn och intäkter
      var burn = 0;
      for (var r = 4; r < rows.length; r++) {
        burn += parseFloat((rows[r][colIdx] || "").replace(/\s/g, "")) || 0;
      }
      var revenue = parseFloat((rows[2][colIdx] || "").replace(/\s/g, "")) || 0;

      cash = cashPosition;
      totalBurn = burn;
      currentRevenue = revenue;
      runway = totalBurn > 0 ? Math.abs(cash) / totalBurn : 0;
      sheetDataLoaded = true;
    }

    // ── Demo pipeline (visas om HubSpot ej är kopplat) ──
    var DEMO_DEALS = [
      { name: "Acme Corp – Sales Transformation", amount: 850000, probability: 0.6, closedate: "2026-04-15" },
      { name: "Nordic Retail – Revenue Architecture", amount: 620000, probability: 0.75, closedate: "2026-03-28" },
      { name: "TechForward AB – Go-to-Market", amount: 480000, probability: 0.5, closedate: "2026-05-10" },
      { name: "eFuel Scandinavia – Retainer Extension", amount: 570000, probability: 0.9, closedate: "2026-03-20" },
      { name: "GreenEnergy Nordic – Pipeline Review", amount: 320000, probability: 0.35, closedate: "2026-06-01" },
      { name: "Logistics Pro – Sales Enablement", amount: 410000, probability: 0.45, closedate: "2026-04-30" },
      { name: "Medtech Solutions – CRO Advisory", amount: 290000, probability: 0.8, closedate: "2026-03-25" },
      { name: "DataDriven AB – Commercial Due Diligence", amount: 750000, probability: 0.3, closedate: "2026-05-20" }
    ];

    var deals = DEMO_DEALS.slice();
    var currentSort = "weighted";
    var isLiveData = false;

    // ── Helpers ──
    function fmt(n) {
      if (n == null || n === "") return "\u2013";
      return new Intl.NumberFormat("sv-SE", { style: "currency", currency: "SEK", maximumFractionDigits: 0 }).format(n);
    }

    function fmtDate(d) {
      if (!d) return "\u2013";
      return new Date(d).toLocaleDateString("sv-SE", { day: "numeric", month: "short" });
    }

    function probBadge(prob) {
      var pct = Math.round((prob || 0) * 100);
      var cls = pct >= 70 ? "prob-high" : pct >= 40 ? "prob-mid" : "prob-low";
      return '<span class="prob-badge ' + cls + '">' + pct + '%</span>';
    }

    // ── HubSpot data (hämtas via GitHub Action → deals.json) ──
    function parseHubSpotDeals(json) {
      var result = [];
      (json.results || []).forEach(function(d) {
        var p = d.properties || {};
        var amount = parseFloat(p.amount) || 0;
        var prob = parseFloat(p.hs_deal_stage_probability) || 0;
        if (prob > 1) prob = prob / 100;
        result.push({
          name: p.dealname || "Namnlös affär",
          amount: amount,
          probability: prob,
          closedate: (p.closedate || "").substring(0, 10)
        });
      });
      return result;
    }

    async function fetchHubSpotDeals() {
      var resp = await fetch("data/deals.json?" + Date.now());
      if (!resp.ok) throw new Error("Ingen deals.json hittad. Kör GitHub Action 'Fetch HubSpot Deals' först.");
      var json = await resp.json();
      return parseHubSpotDeals(json);
    }

    // ── Render stats ──
    function renderStats() {
      var netto90 = cash + currentRevenue * 3 - (totalBurn * 3);
      var grid = document.getElementById("statsGrid");
      var src = sheetDataLoaded ? "Google Sheet (" + sheetMonth + ")" : "Ej kopplad";
      var cards = [
        { label: "1. Cash idag", value: fmt(cash), sub: src, warn: cash < 0 },
        { label: "2. Total burn / mån", value: fmt(totalBurn), sub: "Alla utgifter " + sheetMonth, warn: true },
        { label: "Runway", value: runway.toFixed(1) + " mån", sub: "vid nuvarande burn", warn: runway < 2 },
        { label: "3. Intäkter " + (sheetMonth || "mån"), value: fmt(currentRevenue), sub: "Från Google Sheet", warn: false },
        { label: "Netto position 90 dagar", value: fmt(netto90), sub: "Cash + 3×intäkter – 3×burn", warn: netto90 < 0 }
      ];
      grid.innerHTML = cards.map(function(c) {
        return '<div class="stat-card ' + (c.warn ? 'warn-top' : 'accent-top') + '">' +
          '<div class="label">' + c.label + '</div>' +
          '<div class="value">' + c.value + '</div>' +
          (c.sub ? '<div class="sub">' + c.sub + '</div>' : '') +
          '</div>';
      }).join('');
    }

    // ── Render deals ──
    function renderDeals() {
      var enriched = deals.map(function(d) {
        return Object.assign({}, d, { weighted: d.amount * d.probability });
      });
      var sorted = enriched.slice().sort(function(a, b) {
        if (currentSort === "weighted") return (b.weighted || 0) - (a.weighted || 0);
        if (currentSort === "amount") return (b.amount || 0) - (a.amount || 0);
        if (currentSort === "prob") return (b.probability || 0) - (a.probability || 0);
        return 0;
      });

      var totalWeighted = enriched.reduce(function(s, d) { return s + (d.weighted || 0); }, 0);
      var totalPipeline = enriched.reduce(function(s, d) { return s + (d.amount || 0); }, 0);

      document.getElementById("pipelineSummary").innerHTML =
        deals.length + ' aktiva affärer · Viktat värde: <span class="hl">' + fmt(totalWeighted) +
        '</span> · Pipeline totalt: ' + fmt(totalPipeline);

      document.getElementById("dealsBody").innerHTML = sorted.map(function(deal) {
        return '<div class="table-row">' +
          '<span class="deal-name">' + deal.name + '</span>' +
          '<span class="deal-amount">' + fmt(deal.amount) + '</span>' +
          '<span style="text-align:center">' + probBadge(deal.probability) + '</span>' +
          '<span class="deal-weighted">' + fmt(deal.weighted) + '</span>' +
          '<span class="deal-date">' + fmtDate(deal.closedate) + '</span>' +
          '</div>';
      }).join('');

      document.getElementById("dealsFooter").innerHTML =
        '<span style="color:rgba(255,255,255,0.7)">TOTALT (' + deals.length + ' affärer)</span>' +
        '<span class="deal-amount">' + fmt(totalPipeline) + '</span>' +
        '<span></span>' +
        '<span class="deal-weighted">' + fmt(totalWeighted) + '</span>' +
        '<span></span>';
    }

    function sortDeals(key, el) {
      currentSort = key;
      document.querySelectorAll('.sort-btn').forEach(function(b) { b.classList.remove('active'); });
      el.classList.add('active');
      renderDeals();
    }

    function updateBadge() {
      var badge = document.getElementById("dataSourceBadge");
      if (sheetDataLoaded && isLiveData) {
        badge.className = "data-source-badge live";
        badge.textContent = "Live · Sheet + HubSpot";
      } else if (sheetDataLoaded) {
        badge.className = "data-source-badge live";
        badge.textContent = "Live · Google Sheet";
      } else if (isLiveData) {
        badge.className = "data-source-badge live";
        badge.textContent = "Live · HubSpot";
      } else {
        badge.className = "data-source-badge fallback";
        badge.textContent = "Demo-data";
      }
    }

    // ── Refresh ──
    async function refreshData() {
      var btn = document.getElementById("btnRefresh");
      btn.disabled = true;
      btn.innerHTML = "&#10227; Hämtar...";
      document.getElementById("errorBox").style.display = "none";

      // Hämta Google Sheet (finansdata)
      try {
        await fetchSheetData();
      } catch(e) {
        console.warn("Google Sheet-fel:", e.message);
        sheetDataLoaded = false;
        var box = document.getElementById("errorBox");
        box.textContent = "⚠ Finansdata: " + e.message;
        box.style.display = "block";
      }

      // Hämta HubSpot (pipeline)
      try {
        var hsDeals = await fetchHubSpotDeals();
        if (hsDeals.length > 0) {
          deals = hsDeals;
          isLiveData = true;
        } else {
          deals = DEMO_DEALS.slice();
          isLiveData = false;
        }
      } catch(e) {
        if (!sheetDataLoaded) {
          var box = document.getElementById("errorBox");
          box.textContent = e.message;
          box.style.display = "block";
        }
        deals = DEMO_DEALS.slice();
        isLiveData = false;
      }

      updateBadge();
      renderStats();
      renderDeals();

      btn.disabled = false;
      btn.innerHTML = "&#10227; Uppdatera";
      document.getElementById("lastUpdated").textContent =
        "Uppdaterad " + new Date().toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" });
    }

    // ── Init ──
    renderStats();
    renderDeals();
    updateBadge();
    document.getElementById("lastUpdated").textContent =
      "Uppdaterad " + new Date().toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" });

    // Försök hämta live-data direkt vid laddning
    refreshData();
  </script>
</body>
</html>
