name: Fetch Wint/Superkoll Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Wint data via Superkoll API
        env:
          WINT_USERNAME: ${{ secrets.WINT_USERNAME }}
          WINT_API_KEY: ${{ secrets.WINT_API_KEY }}
        run: |
          if [ -z "$WINT_USERNAME" ] || [ -z "$WINT_API_KEY" ]; then
            echo "::error::WINT_USERNAME and/or WINT_API_KEY secrets are not set!"
            exit 1
          fi
          mkdir -p warroom/data
          python3 .github/scripts/fetch_wint.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add warroom/data/wint.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update Wint/Superkoll data"
          git push

