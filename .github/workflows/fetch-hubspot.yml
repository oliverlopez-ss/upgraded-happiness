name: Fetch HubSpot Deals

on:
  schedule:
    - cron: '0 */2 * * *'  # Var 2:a timme
  workflow_dispatch:        # Manuell körning

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find pipeline ID for "New Sales"
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        id: pipeline
        run: |
          if [ -z "$HUBSPOT_TOKEN" ]; then
            echo "::error::HUBSPOT_TOKEN secret is not set! Go to Settings → Secrets → Actions and add it."
            exit 1
          fi
          echo "Token starts with: ${HUBSPOT_TOKEN:0:8}..."
          PIPELINES=$(curl -s \
            -H "Authorization: Bearer $HUBSPOT_TOKEN" \
            "https://api.hubapi.com/crm/v3/pipelines/deals")
          echo "Available pipelines:"
          echo "$PIPELINES" | python3 -c "
          import json,sys
          for p in json.load(sys.stdin).get('results',[]):
            pid = p.get('pipelineId') or p.get('id','?')
            print(f'  {p.get(\"label\",\"?\")} -> {pid}')
          "
          PIPELINE_ID=$(echo "$PIPELINES" | python3 -c "
          import json,sys
          for p in json.load(sys.stdin).get('results',[]):
            if 'new sales' in p.get('label','').lower():
              print(p.get('pipelineId') or p.get('id','')); break
          ")
          if [ -z "$PIPELINE_ID" ]; then
            echo "::error::Pipeline 'New Sales' not found!"
            exit 1
          fi
          echo "Using pipeline: $PIPELINE_ID"
          echo "pipeline_id=$PIPELINE_ID" >> "$GITHUB_OUTPUT"

      - name: Fetch open deals from "New Sales" pipeline
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          PIPELINE_ID: ${{ steps.pipeline.outputs.pipeline_id }}
        run: |
          mkdir -p warroom/data
          # Fetch all deals in pipeline, then filter out won/lost client-side
          HTTP_CODE=$(curl -s -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $HUBSPOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"filterGroups\": [{
                \"filters\": [
                  {\"propertyName\": \"pipeline\", \"operator\": \"EQ\", \"value\": \"$PIPELINE_ID\"}
                ]
              }],
              \"properties\": [\"dealname\", \"amount\", \"closedate\", \"dealstage\", \"hs_deal_stage_probability\", \"hs_is_closed\", \"pipeline\"],
              \"limit\": 100
            }" \
            "https://api.hubapi.com/crm/v3/objects/deals/search" \
            -o warroom/data/raw.json)
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::HubSpot Search API returned HTTP $HTTP_CODE"
            cat warroom/data/raw.json
            exit 1
          fi
          # Filter out closed deals (won/lost)
          python3 -c "
          import json
          with open('warroom/data/raw.json') as f:
            data = json.load(f)
          all_deals = data.get('results', [])
          # Debug: show all stages and closed status
          print('All deals before filtering:')
          for d in all_deals:
            p = d.get('properties', {})
            print(f'  {p.get(\"dealname\")}: stage={p.get(\"dealstage\")}, closed={p.get(\"hs_is_closed\")}, prob={p.get(\"hs_deal_stage_probability\")}')
          # Filter: exclude if hs_is_closed is true, OR stage contains 'closed'/'won'/'lost'
          def is_open(deal):
            p = deal.get('properties', {})
            if p.get('hs_is_closed', '').lower() == 'true':
              return False
            stage = (p.get('dealstage') or '').lower()
            if any(kw in stage for kw in ['closedwon', 'closedlost', 'closed', 'won', 'lost']):
              return False
            prob = p.get('hs_deal_stage_probability')
            if prob in ('1.0', '0.0'):
              return False
            return True
          filtered = [d for d in all_deals if is_open(d)]
          data['results'] = filtered
          data['total'] = len(filtered)
          with open('warroom/data/deals.json', 'w') as f:
            json.dump(data, f)
          print(f'Filtered: {len(filtered)} open deals out of {len(all_deals)} total')
          for d in filtered:
            p = d['properties']
            print(f'  {p.get(\"dealname\")}: stage={p.get(\"dealstage\")}, amount={p.get(\"amount\")}')
          "
          rm -f warroom/data/raw.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add warroom/data/deals.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update HubSpot deals data"
          git push
