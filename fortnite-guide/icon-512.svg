<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#1a1f3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#af52de"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="90" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.5"/>
  <!-- Controller icon -->
  <g transform="translate(256,220)" fill="url(#accent)">
    <ellipse cx="0" cy="20" rx="130" ry="80" opacity="0.15"/>
    <rect x="-120" y="-40" width="240" height="100" rx="50" fill="url(#accent)"/>
    <circle cx="-60" cy="-10" r="16" fill="#0a0e1a"/>
    <circle cx="60" cy="-10" r="16" fill="#0a0e1a"/>
    <rect x="-40" y="-20" width="80" height="10" rx="5" fill="#0a0e1a" opacity="0.5"/>
    <circle cx="-90" cy="20" r="10" fill="#0a0e1a" opacity="0.4"/>
    <circle cx="90" cy="20" r="10" fill="#0a0e1a" opacity="0.4"/>
  </g>
  <!-- Text -->
  <text x="256" y="370" text-anchor="middle" fill="#f1f5f9" font-family="Arial,sans-serif" font-weight="900" font-size="56">FN GUIDE</text>
  <text x="256" y="415" text-anchor="middle" fill="#00d4ff" font-family="Arial,sans-serif" font-weight="700" font-size="30">PRO</text>
</svg>
