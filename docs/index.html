<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0e1a">
  <title>Fortnite Pro Guide</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Animated background -->
    <div class="bg-effects">
      <div class="bg-grid"></div>
      <div class="bg-glow bg-glow-1"></div>
      <div class="bg-glow bg-glow-2"></div>
      <div class="bg-glow bg-glow-3"></div>
    </div>

    <!-- Header -->
    <header class="app-header" id="appHeader">
      <div class="header-content">
        <div class="header-left" id="headerBack" style="display:none">
          <button class="back-btn" aria-label="Tillbaka">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
        </div>
        <div class="header-center">
          <h1 class="logo" id="headerTitle">
            <span class="logo-icon">🎮</span>
            <span class="logo-text">FN Pro Guide</span>
          </h1>
        </div>
        <div class="header-right">
          <button class="pro-badge" id="proButton" aria-label="Pro Pass">
            <span class="pro-icon">⚡</span>
            <span class="pro-label">PRO</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Main content area -->
    <main class="main-content" id="mainContent">
      <!-- Home view (categories) -->
      <div class="view" id="homeView">
        <div class="hero-section">
          <h2 class="hero-title">Bli bättre på<br><span class="gradient-text">Fortnite</span></h2>
          <p class="hero-subtitle">Guider, tips och tricks från erfarna spelare</p>
        </div>

        <div class="stats-bar" id="statsBar">
          <div class="stat">
            <span class="stat-value" id="totalGuides">0</span>
            <span class="stat-label">Guider</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="totalTips">0</span>
            <span class="stat-label">Tips</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="completedGuides">0</span>
            <span class="stat-label">Lästa</span>
          </div>
        </div>

        <div class="categories-grid" id="categoriesGrid"></div>
      </div>

      <!-- Category view (list of guides) -->
      <div class="view hidden" id="categoryView">
        <div class="category-header" id="categoryHeader"></div>
        <div class="guides-list" id="guidesList"></div>
      </div>

      <!-- Guide view (single guide content) -->
      <div class="view hidden" id="guideView">
        <div class="guide-content" id="guideContent"></div>
      </div>

      <!-- Premium modal -->
      <div class="modal-overlay hidden" id="premiumModal">
        <div class="modal">
          <button class="modal-close" id="modalClose">✕</button>
          <div class="modal-icon">⚡</div>
          <h2 class="modal-title">Uppgradera till <span class="gradient-text">Pro Pass</span></h2>
          <p class="modal-subtitle">Lås upp alla avancerade guider och hemliga tricks</p>
          <ul class="modal-features" id="modalFeatures"></ul>
          <button class="modal-cta" id="modalCta">
            <span class="cta-price" id="ctaPrice"></span>
            <span class="cta-label">Engångsköp - Inga prenumerationer</span>
          </button>
          <button class="modal-restore" id="modalRestore">Återställ köp</button>
        </div>
      </div>
    </main>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-view="home" id="navHome">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>Hem</span>
      </button>
      <button class="nav-item" data-view="search" id="navSearch">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Sök</span>
      </button>
      <button class="nav-item" data-view="progress" id="navProgress">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        <span>Framsteg</span>
      </button>
    </nav>

    <!-- Search overlay -->
    <div class="search-overlay hidden" id="searchOverlay">
      <div class="search-header">
        <div class="search-input-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Sök guider, tips...">
        </div>
        <button class="search-cancel" id="searchCancel">Avbryt</button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <!-- Progress overlay -->
    <div class="progress-overlay hidden" id="progressOverlay">
      <div class="progress-header-section">
        <h2>Din Framsteg</h2>
        <p class="progress-subtitle">Håll koll på din resa mot att bli proffs</p>
      </div>
      <div class="progress-content" id="progressContent"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
